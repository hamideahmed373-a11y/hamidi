<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 450px;
            padding: 40px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 8px;
        }

        .login-header p {
            color: #666;
            font-size: 15px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #444;
            font-weight: 500;
            font-size: 14px;
        }

        .form-control {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #e1e1e1;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.3s ease;
            background-color: #fafafa;
        }

        .form-control:focus {
            outline: none;
            border-color: #667eea;
            background-color: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-row {
            display: flex;
            gap: 15px;
        }

        .form-row .form-group {
            flex: 1;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
        }

        .checkbox-group input {
            margin-right: 10px;
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .checkbox-group label {
            color: #555;
            font-size: 14px;
            cursor: pointer;
            user-select: none;
        }

        .image-upload-container {
            border: 2px dashed #ddd;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            background-color: #f9f9f9;
            margin-bottom: 20px;
        }

        .image-upload-container i {
            font-size: 40px;
            color: #667eea;
            margin-bottom: 10px;
        }

        .image-preview {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 15px;
            display: none;
            border: 3px solid #667eea;
        }

        .upload-btn {
            background-color: #667eea;
            color: white;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            display: inline-block;
            font-weight: 500;
            transition: background-color 0.3s ease;
        }

        .upload-btn:hover {
            background-color: #5a6fd8;
        }

        #imageInput {
            display: none;
        }

        .submit-btn {
            width: 100%;
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.5px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 14px rgba(0, 0, 0, 0.1);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .category-select {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #e1e1e1;
            border-radius: 8px;
            font-size: 15px;
            background-color: #fafafa;
            color: #333;
            cursor: pointer;
        }

        .category-select:focus {
            outline: none;
            border-color: #667eea;
            background-color: white;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }

            .form-row {
                flex-direction: column;
                gap: 0;
            }
        }

        /* Icon styling using Unicode */
        .icon {
            font-style: normal;
        }
    </style>
</head>
<body>
<form method='POST' action="" enctype="multipart/form-data">
    {% csrf_token %}

    <div class="login-container">
        <div class="login-header">
            <h1>User Registration</h1>
            <p>Please fill in all the required information</p>
        </div>
{%for form in forms%}
            <div class="form-group">
                <label >{{form.label}}</label>
                {{ form}}
            </div>
{%endfor%}


            <button type="submit" class="submit-btn" name='hello'>publish the product</button>


    </div>

    <script>
        document.getElementById('imageInput').addEventListener('change', function(event) {
            const file = event.target.files[0];
            const preview = document.getElementById('imagePreview');

            if (file) {
                const reader = new FileReader();

                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    document.querySelector('.image-upload-container .icon').style.display = 'none';
                }

                reader.readAsDataURL(file);
            }
        });

        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault();

            // Get form values
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const place = document.getElementById('place').value;
            const category = document.getElementById('category').value;
            const isActive = document.getElementById('isActive').checked;

            // Basic validation
            if (!name || !email || !place || !category) {
                alert('Please fill in all required fields');
                return;
            }

            // In a real application, you would send this data to a server
            console.log({
                name: name,
                email: email,
                place: place,
                category: category,
                isActive: isActive,
                image: document.getElementById('imageInput').files[0] ? 'Uploaded' : 'Not uploaded'
            });

            // Show success message
            alert('Registration successful! Check console for submitted data.');

            // Reset form (optional)
            // document.getElementById('loginForm').reset();
            // document.getElementById('imagePreview').style.display = 'none';
            // document.querySelector('.image-upload-container .icon').style.display = 'block';
        });
    </script>
    </form>
</body>
</html>
