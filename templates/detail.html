<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details Card</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .subtitle {
            color: #666;
            margin-bottom: 40px;
            font-size: 1.1rem;
        }

        .card-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
        }

        .details-card {
            background-color: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(50, 50, 93, 0.1), 0 5px 15px rgba(0, 0, 0, 0.07);
            width: 100%;
            max-width: 380px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .details-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(50, 50, 93, 0.15), 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .card-header {
            padding: 25px 25px 0;
            position: relative;
        }

        .product-image {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 15px;
        }

        .product-category {
            position: absolute;
            top: 40px;
            left: 40px;
            background: rgba(255, 255, 255, 0.9);
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #ff6b6b;
        }

        .card-body {
            padding: 25px;
            text-align: left;
        }

        .product-name {
            font-size: 1.6rem;
            color: #333;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .product-description {
            color: #666;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .details-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .detail-item {
            display: flex;
            align-items: center;
        }

        .detail-icon {
            width: 40px;
            height: 40px;
            background-color: #f8f9fa;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
            color: #5a67d8;
        }

        .detail-content h4 {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 3px;
        }

        .detail-content p {
            font-size: 1rem;
            color: #333;
            font-weight: 600;
        }

        .price-tag {
            background: linear-gradient(to right, #4776E6, #8E54E9);
            color: white;
            padding: 12px 25px;
            border-radius: 10px;
            font-size: 1.8rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 25px;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            border-top: 1px solid #eee;
            padding: 20px 25px;
        }

        .action-button {
            padding: 12px 25px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            font-size: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-details {
            background-color: #f8f9fa;
            color: #555;
        }

        .btn-details:hover {
            background-color: #e9ecef;
        }

        .btn-cart {
            background: linear-gradient(to right, #4776E6, #8E54E9);
            color: white;
        }

        .btn-cart:hover {
            transform: translateY(-3px);
            box-shadow: 0 7px 14px rgba(50, 50, 93, 0.1);
        }

        .btn-icon {
            margin-right: 8px;
        }

        /* Toggle details section */
        .extra-details {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease;
            background-color: #f8f9fa;
            border-top: 1px solid #eee;
        }

        .extra-details.active {
            max-height: 500px;
        }

        .extra-details-content {
            padding: 20px 25px;
            text-align: left;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .detail-label {
            color: #777;
            font-weight: 500;
        }

        .detail-value {
            color: #333;
            font-weight: 600;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .details-grid {
                grid-template-columns: 1fr;
            }

            .card-footer {
                flex-direction: column;
                gap: 15px;
            }

            .action-button {
                width: 100%;
            }
        }

        .demo-controls {
            margin-top: 40px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
        }

        .demo-controls h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .product-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }

        .product-btn {
            padding: 10px 20px;
            background: #f1f3f5;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        .product-btn:hover {
            background: #e9ecef;
        }

        .product-btn.active {
            background: linear-gradient(to right, #4776E6, #8E54E9);
            color: white;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Product Details Card</h1>

        <div class="card-container">
            <div class="details-card" id="productCard">
                <div class="card-header">
                    <img id="productImage"  class="product-image" src="{{product.image.url}}" alt="Product Image">
                    <span class="product-category" id="productCategory">{{product.category}}</span>
                </div>

                <div class="card-body">
                    <h2 class="product-name" id="productName">{{product.name}}</h2>
                    <p class="product-description" id="productDescription">{{product.description}}</p>

                    <div class="details-grid">
                        <div class="detail-item">
                            <div class="detail-icon">
                                <i class="fas fa-calendar-alt"></i>
                            </div>
                            <div class="detail-content">
                                <h4>Date Added</h4>
                                <p id="productDate">{{product.created_at}}</p>
                            </div>
                        </div>

                        <div class="detail-item">
                            <div class="detail-icon">
                                <i class="fas fa-tag"></i>
                            </div>
                            <div class="detail-content">
                                <h4>Category</h4>
                                <p id="productCategoryText">Audio</p>
                            </div>
                        </div>

                        <div class="detail-item">
                            <div class="detail-icon">
                                <i class="fas fa-shop"></i>
                            </div>
                            <div class="detail-content">
                                <h4>contact</h4>
                                <p id="productRating">{{product.shop.name}}</p>
                            </div>
                        </div>

                    <div class="detail-item">
                            <div class="detail-icon">
                                <i class="fas fa-phone"></i>
                            </div>
                            {{product.shop.phone}}
                        </div>
                    </div>
                     <div class="detail-item">
                            <div class="detail-icon">
                                <i class="fas fa-location"></i>
                            </div>
                            {{product.shop.place}}
                        </div>
                    </div>



                    <div class="price-tag" id="productPrice">da{{product.price}}</div>
                </div>

    </div>
</div>

</body>
</html>
